version: "3.9"

services:
  # ── Backend API ─────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - backend-data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Dashboard ──────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
